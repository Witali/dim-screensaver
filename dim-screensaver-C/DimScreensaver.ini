# Time to fade the screen in before optional Windows locking.
# Use 10, 20, or 60 for 10 seconds, 20 seconds, or 1 minute.
FadeInSeconds=10

# Time to fade the screen out after mouse or keyboard input.
FadeOutSeconds=1

# Set to false to keep the screen dimmed without locking Windows.
LockWorkstation=true

# Optional image file to dim instead of the current Windows wallpaper.
# Relative paths are resolved next to DimScreensaver.scr.
# BackgroundImagePath=
